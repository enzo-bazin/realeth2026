[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@worldcoin/=lib/world-id-contracts/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
world_chain_testnet = "${WORLD_CHAIN_TESTNET_RPC_URL}"
world_chain = "${WORLD_CHAIN_RPC_URL}"
localhost = "http://127.0.0.1:8545"

[etherscan]
world_chain_testnet = { key = "${ETHERSCAN_API_KEY}" }
